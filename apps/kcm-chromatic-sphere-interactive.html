<title>KCM Chromatic Sphere — Interactive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at center, #1e3048 0%, #0f1924 60%, #080e16 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  .kcm-header {
    text-align: center;
    margin-bottom: 28px;
    z-index: 10;
    position: relative;
  }
  .kcm-title {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: normal;
    color: #e8f0f8;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .kcm-title .keys  { color: #4A7BA7; }
  .kcm-title .codes { color: #F4D03F; }
  .kcm-title .modes { color: #008080; }
  .kcm-sub {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #708090;
  }

  /* ── SPECTRUM HEADER BAR ── */
  .spectrum-bar {
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg,
      #FFFF00 0%, #FFC400 8.3%, #FF8000 16.6%, #FF4000 25%,
      #FF0000 33.3%, #C4007F 41.6%, #8000FF 50%, #4000FF 58.3%,
      #0000FF 66.6%, #007FFF 75%, #00FF80 83.3%, #80FF00 100%
    );
    margin-bottom: 20px;
    border-radius: 2px;
    width: 500px;
    max-width: 90vw;
  }

  /* ── SPHERE CANVAS WRAPPER ── */
  .sphere-wrap {
    position: relative;
    width: 420px;
    height: 420px;
    max-width: 90vw;
    max-height: 90vw;
  }

  canvas#sphere {
    width: 100%;
    height: 100%;
    cursor: pointer;
    touch-action: none;
  }

  /* ── ACTIVE NOTE DISPLAY ── */
  .note-display {
    margin-top: 24px;
    text-align: center;
    height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s;
  }
  .note-name {
    font-family: Georgia, serif;
    font-size: 42px;
    font-weight: normal;
    color: #F4D03F;
    letter-spacing: 2px;
    line-height: 1;
    transition: color 0.2s, transform 0.2s;
  }
  .note-info {
    font-size: 11px;
    letter-spacing: 3px;
    color: #708090;
    margin-top: 6px;
    text-transform: uppercase;
  }
  .note-display.active .note-name {
    transform: scale(1.08);
  }

  /* ── OCTAVE CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
  }
  .ctrl-btn {
    background: rgba(74,123,167,0.15);
    border: 1px solid #2a4d6f;
    color: #4A7BA7;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover {
    background: rgba(74,123,167,0.3);
    border-color: #4A7BA7;
    color: #e8f0f8;
  }
  .ctrl-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #708090;
    text-transform: uppercase;
  }
  .octave-val {
    font-family: Georgia, serif;
    font-size: 18px;
    color: #F4D03F;
    min-width: 20px;
    text-align: center;
  }

  /* ── VOLUME SLIDER ── */
  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .volume-wrap label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #708090;
    text-transform: uppercase;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 120px;
    height: 4px;
    background: #2a4d6f;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #F4D03F;
    cursor: pointer;
  }

  /* ── HINT ── */
  .hint {
    margin-top: 16px;
    font-size: 9px;
    letter-spacing: 2px;
    color: #3a5068;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── FOOTER BRAND ── */
  .brand-footer {
    position: fixed;
    bottom: 16px;
    font-size: 9px;
    letter-spacing: 2px;
    color: #2a3d52;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="kcm-header">
  <div class="kcm-title">
    <span class="keys">Keys</span>, <span class="codes">Codes</span> &amp; <span class="modes">Modes</span>
  </div>
  <div class="kcm-sub">Interactive Chromatic Sphere</div>
</div>

<div class="spectrum-bar"></div>

<div class="sphere-wrap">
  <canvas id="sphere" width="420" height="420"></canvas>
</div>

<div class="note-display" id="noteDisplay">
  <div class="note-name" id="noteName">—</div>
  <div class="note-info" id="noteInfo">Touch a note to play</div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="octDown">▼</button>
  <div style="text-align:center;">
    <div class="ctrl-label">Octave</div>
    <div class="octave-val" id="octaveVal">4</div>
  </div>
  <button class="ctrl-btn" id="octUp">▲</button>
</div>

<div class="volume-wrap">
  <label>Volume</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>

<div class="hint">Tap or click any note sphere · Use octave controls to change pitch range</div>

<div class="brand-footer">keyscodesandmodes.com</div>

<script>
// ══════════════════════════════════════════════
//  KCM CHROMATIC DATA — Official Brand Colors
// ══════════════════════════════════════════════
const NOTES = [
  { name: 'C',   enharmonic: '',    color: '#FFFF00', midi: 60, freq: 261.63 },
  { name: 'C#',  enharmonic: 'Db',  color: '#FFC400', midi: 61, freq: 277.18 },
  { name: 'D',   enharmonic: '',    color: '#FF8000', midi: 62, freq: 293.66 },
  { name: 'D#',  enharmonic: 'Eb',  color: '#FF4000', midi: 63, freq: 311.13 },
  { name: 'E',   enharmonic: '',    color: '#FF0000', midi: 64, freq: 329.63 },
  { name: 'F',   enharmonic: '',    color: '#C4007F', midi: 65, freq: 349.23 },
  { name: 'F#',  enharmonic: 'Gb',  color: '#8000FF', midi: 66, freq: 369.99 },
  { name: 'G',   enharmonic: '',    color: '#4000FF', midi: 67, freq: 392.00 },
  { name: 'G#',  enharmonic: 'Ab',  color: '#0000FF', midi: 68, freq: 415.30 },
  { name: 'A',   enharmonic: '',    color: '#007FFF', midi: 69, freq: 440.00 },
  { name: 'A#',  enharmonic: 'Bb',  color: '#00FF80', midi: 70, freq: 466.16 },
  { name: 'B',   enharmonic: '',    color: '#80FF00', midi: 71, freq: 493.88 },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let octave = 4;
let volume = 0.6;
let activeNote = null;
let activeTimeout = null;
let audioCtx = null;
let hoverNote = null;
let animFrame = null;
let glowPhase = 0;

const canvas = document.getElementById('sphere');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const CX = W / 2;
const CY = H / 2;
const ORBIT_R = 155;   // orbit radius
const BASE_R  = 22;    // normal sphere radius
const ACTIVE_R = 30;   // active/hover sphere radius (larger)

// Pre-compute note positions (clock layout, C at top)
const positions = NOTES.map((note, i) => {
  const angle = (i / 12) * Math.PI * 2 - Math.PI / 2; // C at 12 o'clock
  return {
    x: CX + ORBIT_R * Math.cos(angle),
    y: CY + ORBIT_R * Math.sin(angle),
    angle
  };
});

// ══════════════════════════════════════════════
//  AUDIO — Web Audio API synthesis
// ══════════════════════════════════════════════
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function getFrequency(noteIndex, oct) {
  // MIDI note number: C4 = 60
  const midiBase = 12 + (oct * 12) + noteIndex; // C0=12, C4=60
  return 440 * Math.pow(2, (midiBase - 69) / 12);
}

function playNote(noteIndex, oct) {
  const ac = getAudioCtx();
  const freq = getFrequency(noteIndex, oct);
  const vol = parseFloat(document.getElementById('volSlider').value);

  // Oscillator (sine + harmonics for warmth)
  const osc1 = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const gainNode = ac.createGain();
  const masterGain = ac.createGain();

  osc1.type = 'sine';
  osc1.frequency.value = freq;
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2; // octave harmonic

  const g1 = ac.createGain(); g1.gain.value = 0.7;
  const g2 = ac.createGain(); g2.gain.value = 0.18;

  osc1.connect(g1); g1.connect(gainNode);
  osc2.connect(g2); g2.connect(gainNode);
  gainNode.connect(masterGain);
  masterGain.connect(ac.destination);

  // Envelope: attack → sustain → release
  const now = ac.currentTime;
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(vol, now + 0.02);
  masterGain.gain.setValueAtTime(vol, now + 0.3);
  masterGain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

  osc1.start(now); osc1.stop(now + 1.8);
  osc2.start(now); osc2.stop(now + 1.8);
}

// ══════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawSphere(x, y, r, color, isActive, isHover, phase) {
  const rgb = hexToRgb(color);
  const alpha = isActive ? 1 : isHover ? 0.92 : 0.82;

  // Glow effect for active/hover
  if (isActive || isHover) {
    const glowR = isActive ? r * 2.8 + Math.sin(phase) * 4 : r * 2.0;
    const glowOpacity = isActive ? 0.45 + Math.sin(phase)*0.12 : 0.22;
    const glow = ctx.createRadialGradient(x, y, r * 0.3, x, y, glowR);
    glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${glowOpacity})`);
    glow.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
    ctx.beginPath();
    ctx.arc(x, y, glowR, 0, Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // Sphere body
  const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.05, x, y, r);
  grad.addColorStop(0, `rgba(255,255,255,0.9)`);
  grad.addColorStop(0.2, `rgba(${rgb.r},${rgb.g},${rgb.b},1)`);
  grad.addColorStop(0.7, `rgba(${Math.max(0,rgb.r-60)},${Math.max(0,rgb.g-60)},${Math.max(0,rgb.b-60)},1)`);
  grad.addColorStop(1, `rgba(${Math.max(0,rgb.r-90)},${Math.max(0,rgb.g-90)},${Math.max(0,rgb.b-90)},0.9)`);

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Active ring pulse
  if (isActive) {
    const pulseR = r + 5 + Math.sin(phase) * 3;
    ctx.beginPath();
    ctx.arc(x, y, pulseR, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.6 + Math.sin(phase)*0.3})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Specular highlight
  ctx.beginPath();
  ctx.arc(x - r*0.28, y - r*0.28, r*0.25, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
}

function drawOrbitRing() {
  // Subtle chromatic ring
  const grad = ctx.createConicGradient(-Math.PI/2, CX, CY);
  NOTES.forEach((n, i) => {
    grad.addColorStop(i/12, n.color);
  });
  grad.addColorStop(1, NOTES[0].color);

  ctx.beginPath();
  ctx.arc(CX, CY, ORBIT_R, 0, Math.PI*2);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.18;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawCenterLogo() {
  // KCM center logo area
  const cGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 52);
  cGrad.addColorStop(0, 'rgba(30,48,72,0.9)');
  cGrad.addColorStop(1, 'rgba(15,25,36,0.7)');
  ctx.beginPath();
  ctx.arc(CX, CY, 52, 0, Math.PI*2);
  ctx.fillStyle = cGrad;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(CX, CY, 52, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(74,123,167,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#4A7BA7';
  ctx.font = 'bold 11px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('KCM', CX, CY - 6);
  ctx.fillStyle = '#708090';
  ctx.font = '8px "Courier New"';
  ctx.fillText('CHROMATIC', CX, CY + 6);
  ctx.fillText('SPHERE', CX, CY + 17);
}

function drawNoteLabel(x, y, r, note, isActive, isHover) {
  const labelY = y + r + 14;
  ctx.textAlign = 'center';

  if (isActive || isHover) {
    ctx.fillStyle = isActive ? '#F4D03F' : '#e8f0f8';
    ctx.font = `bold ${isActive ? 13 : 12}px "Courier New"`;
  } else {
    ctx.fillStyle = '#708090';
    ctx.font = '10px "Courier New"';
  }
  ctx.fillText(note.name, x, labelY);

  if (note.enharmonic && (isActive || isHover)) {
    ctx.fillStyle = 'rgba(112,128,144,0.7)';
    ctx.font = '8px "Courier New"';
    ctx.fillText(note.enharmonic, x, labelY + 10);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  glowPhase += 0.08;

  // Background
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, W*0.7);
  bg.addColorStop(0, '#1e3048');
  bg.addColorStop(1, '#080e16');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawOrbitRing();

  // Draw spoke lines from center to each note (subtle)
  NOTES.forEach((note, i) => {
    const p = positions[i];
    const isActive = activeNote === i;
    const isHover = hoverNote === i;
    if (isActive || isHover) {
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(p.x, p.y);
      const rgb = hexToRgb(note.color);
      ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${isActive ? 0.4 : 0.15})`;
      ctx.lineWidth = isActive ? 1.5 : 0.8;
      ctx.stroke();
    }
  });

  // Draw all spheres
  NOTES.forEach((note, i) => {
    const p = positions[i];
    const isActive = activeNote === i;
    const isHover = hoverNote === i;
    const r = isActive ? ACTIVE_R : isHover ? BASE_R + 5 : BASE_R;
    drawSphere(p.x, p.y, r, note.color, isActive, isHover, glowPhase);
    drawNoteLabel(p.x, p.y, r, note, isActive, isHover);
  });

  drawCenterLogo();

  animFrame = requestAnimationFrame(draw);
}

// ══════════════════════════════════════════════
//  HIT DETECTION
// ══════════════════════════════════════════════
function getHitNote(cx, cy) {
  // Scale from display coords to canvas coords
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = cx * scaleX;
  const y = cy * scaleY;

  for (let i = 0; i < 12; i++) {
    const p = positions[i];
    const r = activeNote === i ? ACTIVE_R : BASE_R + 8; // generous hit area
    const dist = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
    if (dist <= r) return i;
  }
  return null;
}

function activateNote(noteIndex) {
  if (noteIndex === null) return;
  activeNote = noteIndex;
  const note = NOTES[noteIndex];

  // Update display
  const nameEl = document.getElementById('noteName');
  const infoEl = document.getElementById('noteInfo');
  const dispEl = document.getElementById('noteDisplay');
  nameEl.textContent = note.name + (note.enharmonic ? ' / ' + note.enharmonic : '');
  nameEl.style.color = note.color;
  const freq = getFrequency(noteIndex, octave);
  infoEl.textContent = `MIDI ${12 + octave*12 + noteIndex} · ${freq.toFixed(1)} Hz · Octave ${octave}`;
  dispEl.classList.add('active');

  // Play sound
  playNote(noteIndex, octave);

  // Clear after 1.8s
  if (activeTimeout) clearTimeout(activeTimeout);
  activeTimeout = setTimeout(() => {
    activeNote = null;
    dispEl.classList.remove('active');
    nameEl.textContent = '—';
    nameEl.style.color = '#F4D03F';
    infoEl.textContent = 'Touch a note to play';
  }, 1800);
}

// ══════════════════════════════════════════════
//  EVENT LISTENERS
// ══════════════════════════════════════════════

// Mouse
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  hoverNote = getHitNote(e.clientX - rect.left, e.clientY - rect.top);
  canvas.style.cursor = hoverNote !== null ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { hoverNote = null; });
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const hit = getHitNote(e.clientX - rect.left, e.clientY - rect.top);
  if (hit !== null) activateNote(hit);
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const hit = getHitNote(t.clientX - rect.left, t.clientY - rect.top);
  if (hit !== null) activateNote(hit);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  hoverNote = getHitNote(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  hoverNote = null;
}, { passive: false });

// Octave controls
document.getElementById('octDown').addEventListener('click', () => {
  if (octave > 1) { octave--; document.getElementById('octaveVal').textContent = octave; }
});
document.getElementById('octUp').addEventListener('click', () => {
  if (octave < 7) { octave++; document.getElementById('octaveVal').textContent = octave; }
});

// Volume
document.getElementById('volSlider').addEventListener('input', e => {
  volume = parseFloat(e.target.value);
});

// ══════════════════════════════════════════════
//  KEYBOARD SUPPORT (C D E F G A B = notes)
// ══════════════════════════════════════════════
const KEY_MAP = {
  'a': 0,  // C
  'w': 1,  // C#
  's': 2,  // D
  'e': 3,  // D#
  'd': 4,  // E
  'f': 5,  // F
  't': 6,  // F#
  'g': 7,  // G
  'y': 8,  // G#
  'h': 9,  // A
  'u': 10, // A#
  'j': 11, // B
};
document.addEventListener('keydown', e => {
  const idx = KEY_MAP[e.key.toLowerCase()];
  if (idx !== undefined) activateNote(idx);
  if (e.key === 'ArrowUp' && octave < 7) { octave++; document.getElementById('octaveVal').textContent = octave; }
  if (e.key === 'ArrowDown' && octave > 1) { octave--; document.getElementById('octaveVal').textContent = octave; }
});

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
draw();
</script>
</body>
</html>
